naftiko: 1.0.0-alpha2
info:
  label: Triton One Customers API — Accounts
  description: 'Triton One Customers API — Accounts. 3 operations covering list, get, and update for Triton customer accounts.'
  tags:
    - Triton One
    - Accounts
    - Customers
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
  - namespace: env
    keys:
      TRITON_CUSTOMERS_TOKEN: TRITON_CUSTOMERS_TOKEN
capability:
  consumes:
    - type: http
      namespace: customers-accounts
      baseUri: https://customers.triton.one
      description: Triton One Customers API — Accounts business capability.
      resources:
        - name: accounts
          path: /api/v1/accounts
          operations:
            - name: listAccounts
              method: GET
              description: List Accounts
              outputRawFormat: json
              inputParameters:
                - name: name
                  in: query
                  type: string
                - name: per
                  in: query
                  type: integer
                - name: page
                  in: query
                  type: integer
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: account
          path: /api/v1/accounts/{accountUuid}
          operations:
            - name: getAccount
              method: GET
              description: Get Account
              outputRawFormat: json
              inputParameters:
                - name: accountUuid
                  in: path
                  type: string
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
            - name: updateAccount
              method: PUT
              description: Update Account
              outputRawFormat: json
              inputParameters:
                - name: accountUuid
                  in: path
                  type: string
                  required: true
                - name: body
                  in: body
                  type: object
                  required: true
              outputParameters:
                - name: result
                  type: object
                  value: $.
      authentication:
        type: bearer
        value: '{{env.TRITON_CUSTOMERS_TOKEN}}'
  exposes:
    - type: rest
      namespace: customers-accounts-rest
      port: 8080
      description: REST adapter for Triton Customers Accounts.
      resources:
        - path: /v1/accounts
          name: accounts
          description: REST surface for accounts.
          operations:
            - method: GET
              name: listAccounts
              description: List Accounts
              call: customers-accounts.listAccounts
              with:
                name: rest.query.name
                per: rest.query.per
                page: rest.query.page
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/accounts/{accountUuid}
          name: account
          description: REST surface for a single account.
          operations:
            - method: GET
              name: getAccount
              description: Get Account
              call: customers-accounts.getAccount
              with:
                accountUuid: rest.path.accountUuid
              outputParameters:
                - type: object
                  mapping: $.
            - method: PUT
              name: updateAccount
              description: Update Account
              call: customers-accounts.updateAccount
              with:
                accountUuid: rest.path.accountUuid
                body: rest.body
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: customers-accounts-mcp
      port: 9090
      transport: http
      description: MCP adapter for Triton Customers Accounts.
      tools:
        - name: triton-list-accounts
          description: List Triton customer accounts.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: customers-accounts.listAccounts
          with:
            name: tools.name
            per: tools.per
            page: tools.page
          outputParameters:
            - type: object
              mapping: $.
        - name: triton-get-account
          description: Get a Triton customer account by UUID.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: customers-accounts.getAccount
          with:
            accountUuid: tools.accountUuid
          outputParameters:
            - type: object
              mapping: $.
        - name: triton-update-account
          description: Update a Triton customer account.
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: customers-accounts.updateAccount
          with:
            accountUuid: tools.accountUuid
            body: tools.body
          outputParameters:
            - type: object
              mapping: $.
