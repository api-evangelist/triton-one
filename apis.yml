    description: >-
      Dragon's Mouth — Triton's high-performance Solana streaming gRPC service. Subscribe to slots, blocks,
      transactions, accounts, and blockmeta updates over a single bidirectional gRPC stream. Open-source server
      reference at github.com/rpcpool/yellowstone-grpc (Rust, AGPL-3.0).
  - aid: triton-one:triton-one-fumarole
    name: Triton One Fumarole Persistent Streams
    tags:
      - Solana
      - Streaming
      - Yellowstone
      - Fumarole
    humanURL: https://docs.triton.one/project-yellowstone/fumarole
    properties:
