description: >-
  Triton One is a high-performance Solana RPC and blockchain infrastructure provider operating globally distributed
  bare-metal node networks for Solana, Pythnet, Sui, and Monad. Beyond standard Solana JSON-RPC, Triton ships the
  Yellowstone ecosystem — Dragon's Mouth gRPC streaming, Whirligig WebSockets, Fumarole persistent streams, Old Faithful
  historical archive, Steamboat custom indexes, Vixen program parsing, Jet QUIC transaction sending, and Shield
  transaction policies — plus the hosted Metaplex Digital Assets API, Cascade SWQoS transaction delivery, and trading
  APIs (Pyth Hermes, Jito bundles, Metis, Titan). The Customers REST API at customers.triton.one programmatically
  manages accounts, subscriptions, endpoints, tokens, address watch lists, and rate tiers. Pricing is a single unified
  pay-as-you-go model with a $125 prepaid deposit and no tier gating.
