        type: Documentation
      - url: openapi/triton-one-solana-rpc-api-openapi.yml
        type: OpenAPI
    description: >-
      Triton's enhanced Solana JSON-RPC interface. Exposes the full Solana JSON-RPC surface plus Triton's custom
      extensions — getTransactionsForAddress (single-call address history with slot, blockTime, status, and
      tokenAccounts filters and pagination) and the percentile-aware getRecentPrioritizationFees. Backed by global
      bare-metal nodes with GeoDNS routing.
  - aid: triton-one:triton-one-digital-assets-api
    name: Triton One Digital Assets API
    tags:
      - Solana
      - Digital Assets
      - Metaplex
      - NFT
      - DAS
    humanURL: https://docs.triton.one/digital-assets-api/introduction
    baseURL: https://${endpoint}.rpcpool.com
    properties:
      - url: https://docs.triton.one/digital-assets-api/introduction
        type: Documentation
      - url: https://docs.triton.one/digital-assets-api/metaplex-digital-assets-api
        type: Documentation
      - url: https://docs.triton.one/digital-assets-api/fungible-assets
        type: Documentation
      - url: openapi/triton-one-digital-assets-api-openapi.yml
        type: OpenAPI
    description: >-
      Hosted Metaplex Digital Assets Standard (DAS) implementation served from the same Triton RPC endpoint. Read
      methods for compressed and standard NFTs (getAsset, getAssets, getAssetProof(s), getAssetSignatures, searchAssets,
      getAssetsBy{Owner,Creator,Authority}, getNftEditions) plus SPL token introspection (getTokenAccounts,
      getTokenLargestAccounts). Powered by Triton's Photon indexer.
  - aid: triton-one:triton-one-yellowstone-grpc
    name: Triton One Yellowstone gRPC (Dragon's Mouth)
    tags:
      - Solana
      - gRPC
      - Streaming
      - Yellowstone
