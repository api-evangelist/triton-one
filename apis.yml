    description: >-
      REST API for managing Triton One customer accounts, subscriptions (Developer, Mainnet-Shared, Mainnet-Dedicated),
      RPC endpoints, RPC consumption tokens, address watch lists, and rate tiers. Token-based authentication via the
      Authorization header; tokens scope to reseller, operator, or read-only roles. Hosted at
      customers.triton.one/api/v1.
  - aid: triton-one:triton-one-solana-rpc-api
    name: Triton One Solana RPC API
    tags:
      - Solana
      - RPC
      - JSON-RPC
      - Priority Fees
      - Streaming
    humanURL: https://docs.triton.one/chains/solana
    baseURL: https://${endpoint}.rpcpool.com
    properties:
      - url: https://docs.triton.one/chains/solana
        type: Documentation
      - url: https://docs.triton.one/chains/solana/improved-priority-fees-api
        type: Documentation
